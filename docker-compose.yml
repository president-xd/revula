version: '3.8'

services:
  revula-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: revula:latest
    container_name: revula-stdio
    stdin_open: true
    tty: false
    volumes:
      - ./workspace:/workspace
      - revula-data:/root/.revula
    environment:
      - REVULA_MAX_MEMORY_MB=2048
      - REVULA_DEFAULT_TIMEOUT=300
    command: []
    profiles:
      - stdio

  revula-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: revula:dev
    container_name: revula-dev
    stdin_open: true
    tty: true
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./workspace:/workspace
      - revula-data:/root/.revula
    environment:
      - REVULA_MAX_MEMORY_MB=4096
      - REVULA_DEFAULT_TIMEOUT=600
    working_dir: /app
    entrypoint: ["/bin/bash"]
    command: []
    profiles:
      - dev

volumes:
  revula-data:
    driver: local

networks:
  default:
    name: revula-network
